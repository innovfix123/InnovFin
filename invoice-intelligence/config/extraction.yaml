# ============================================================================
# CONTENT EXTRACTION  —  Part 2, Milestone 2.3   (deterministic-first, local, no paid AI)
# ============================================================================

version: 1

# DocumentType -> extraction method. Sensible defaults are built in; override here if needed.
# methods: xml | json | pymupdf | ocr | review
routes: {}

ocr:
  provider: tesseract          # DEFAULT local OCR. Cloud providers are optional plugins,
                               # NOT integrated (require explicit approval + data-governance).
  lang: eng                    # add 'eng+hin' etc. once language packs are installed
  tesseract_config: ""         # extra tesseract flags, e.g. "--psm 6"
  binary_path: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"  # explicit path; falls back to PATH / known dirs if empty
  min_confidence: 0.6          # OCR result below this -> manual review

audit:
  path: build/audit/extraction.jsonl
