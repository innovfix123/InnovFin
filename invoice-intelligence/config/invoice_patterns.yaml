# Regex patterns for financial-entity and filename detection. Kept in config so new
# vendor templates / entity formats need NO code change. Patterns are compiled once at load.

# Financial entities detected in subject + body text (no attachment contents in Phase 1).
entities:
  gstin:          '\b\d{2}[A-Z]{5}\d{4}[A-Z][0-9A-Z][Zz][0-9A-Z]\b'
  pan:            '\b[A-Z]{5}[0-9]{4}[A-Z]\b'
  invoice_number: '(?i)\b(?:inv(?:oice)?|bill)\s*(?:no\.?|number|#|:)?\s*[-/]?\s*[A-Z0-9]{2,}[-/]?\d{2,}\b'
  po_number:      '(?i)\b(?:p\.?\s?o\.?|purchase\s*order)\s*(?:no\.?|number|#|:)?\s*[-/]?\s*[A-Z0-9-]{3,}\b'
  amount:         '(?i)(?:₹|rs\.?|inr|usd|\$|eur|€|gbp|£)\s?[\d,]+(?:\.\d{1,2})?'
  hsn_sac:        '(?i)\b(?:hsn|sac)\s*(?:code)?[:\s]*\d{4,8}\b'
  irn:            '\b[0-9a-f]{64}\b'   # GST e-invoice IRN hash

# Attachment filename patterns (case-insensitive) that indicate an invoice document.
filename_patterns:
  - 'invoice'
  - 'inv[-_ ]?\d+'
  - 'tax[-_ ]?invoice'
  - 'gst'
  - 'bill'
  - 'receipt'
  - 'statement'
  - 'credit[-_ ]?note'
  - 'debit[-_ ]?note'
  - 'payment[-_ ]?advice'
  - 'purchase[-_ ]?order'
  - '\bpo[-_ ]?\d+'

# File extensions that denote a STRUCTURED e-invoice (very strong signal).
structured_extensions:
  - .xml
  - .ubl
  - .cii

# Document-type affinity carried by an entity match (used by pattern detectors).
entity_doc_type_affinity:
  gstin:          { invoice: 0.6, credit_note: 0.4, debit_note: 0.4 }
  invoice_number: { invoice: 0.7 }
  po_number:      { purchase_order: 0.7, invoice: 0.3 }
  amount:         { invoice: 0.3, statement: 0.3, payment_advice: 0.3 }
  irn:            { invoice: 0.8 }
